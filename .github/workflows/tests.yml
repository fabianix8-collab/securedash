name: Tests — detection engine

# Corre la suite de pytest del pipeline en cada push/PR que toque el
# codigo de deteccion. Esto es lo que hace que "5 reglas de deteccion
# documentadas" sea una afirmacion verificable, no solo un README.
on:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "pipeline/**"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: pipeline
        run: python3 -m pytest -v
